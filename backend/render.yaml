# Blueprint de Render para el backend OptiDriver.
# Render lo detecta automáticamente al conectar el repositorio.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: optidriver-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render genera un secreto seguro
      - key: NODE_VERSION
        value: 20
    # Disco persistente para que la base SQLite no se borre en cada deploy.
    # (Requiere plan de pago en Render; en el plan free los datos se reinician.)
    disk:
      name: optidriver-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
